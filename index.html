<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SDUFE 图书馆签到系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-checkin {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .btn-leave {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-checkout {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
            display: block;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            display: block;
        }
        
        .status.error {
            background: #ffebee;
            color: #d32f2f;
            display: block;
            text-align: left;
        }
        
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }
        
        .info strong {
            color: #333;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 主应用界面（默认隐藏，密码验证后显示） -->
    <div class="container" id="appContainer">
        <h1>📚 图书馆签到</h1>
        <div class="subtitle">山东财经大学 · 远程签到系统</div>
        
        <div class="status" id="status"></div>
        
        <div class="btn-group">
            <button class="btn btn-checkin" id="btnCheckin" onclick="handleAction('in')">
                ✅ 签到入馆
            </button>
            <button class="btn btn-leave" id="btnLeave" onclick="handleAction('leave')">
                🚶 临时离馆
            </button>
            <button class="btn btn-checkout" id="btnCheckout" onclick="handleAction('out')">
                🚪 签离出馆
            </button>
        </div>
        
        <div class="info">
            <strong>⚠️ 使用说明：</strong><br>
            1. 确保手机已连接校园网（WLAN: SDUFE）<br>
            2. 建议先关注"山东财经大学图书馆"公众号并登录<br>
            3. 点击按钮后，系统会自动获取时间戳并跳转签到<br>
            4. 如提示"非法请求"，请先重新登录图书馆账号
        </div>
    </div>

    <script>
    // ===== 密码验证模块（混淆版） =====
    (function() {
        'use strict';
        
        // 🔑 密钥数组（10个数字，对应10位密码）
        const SECRET_KEY = [7, 3, 9, 1, 5, 8, 2, 4, 6, 7];
        
        // 🔒 加密后的密码（十六进制，这是 "zhtzht8888" 的加密结果）
        const ENCRYPTED_PASSWORD = "816b7d7b6d7c3a3c3e3f";
        
        // 🧮 密码验证函数
        function verifyPassword(userInput) {
            if (userInput.length !== SECRET_KEY.length) return false;
            
            const inputChars = userInput.split('').map(c => c.charCodeAt(0));
            const encryptedInput = inputChars.map((charCode, index) => {
                return charCode + SECRET_KEY[index];
            });
            
            const hexString = encryptedInput.map(num => {
                return num.toString(16).padStart(2, '0');
            }).join('');
            
            return hexString === ENCRYPTED_PASSWORD;
        }
        
        // 🔐 启动验证
        function initAuth() {
            const savedAuth = localStorage.getItem('library_auth');
            if (savedAuth === 'true') {
                initApp();
                return;
            }
            
            const userInput = prompt('🔐 请输入访问密码：');
            if (userInput === null) {
                document.body.innerHTML = '<h2 style="text-align:center;margin-top:50px;color:white;">访问已取消</h2>';
                return;
            }
            
            if (!verifyPassword(userInput)) {
                alert('❌ 密码错误！');
                document.body.innerHTML = '<h2 style="text-align:center;margin-top:50px;color:white;">访问被拒绝</h2>';
                return;
            }
            
            localStorage.setItem('library_auth', 'true');
            initApp();
        }
        
        initAuth();
    })();

    // ===== 主应用逻辑 =====
    function initApp() {
        // 显示主界面
        document.getElementById('appContainer').classList.remove('hidden');
    }
    
    // 显示状态消息
    function showStatus(message, type) {
        const statusEl = document.getElementById('status');
        statusEl.innerHTML = message;
        statusEl.className = 'status ' + type;
        statusEl.classList.remove('hidden');
    }
    
    // 隐藏状态消息
    function hideStatus() {
        const statusEl = document.getElementById('status');
        statusEl.classList.add('hidden');
    }
    
    // 设置按钮状态
    function setButtonsDisabled(disabled) {
        document.getElementById('btnCheckin').disabled = disabled;
        document.getElementById('btnLeave').disabled = disabled;
        document.getElementById('btnCheckout').disabled = disabled;
    }
    
    // 处理签到/离馆/签离操作
    async function handleAction(action) {
        hideStatus();
        setButtonsDisabled(true);
        
        // 确定类型参数
        const typeMap = {
            'in': 1,      // 签到入馆
            'leave': 2,    // 临时离馆
            'out': 3        // 签离出馆
        };
        
        const type = typeMap[action];
        const actionName = {
            'in': '签到入馆',
            'leave': '临时离馆',
            'out': '签离出馆'
        }[action];
        
        showStatus('⏳ 正在获取时间戳...', 'loading');
        
        try {
            // 调用图书馆API获取时间戳
            const apiUrl = 'https://libst.sdufe.edu.cn/api.php/v3qrtime';
            
            const fetchResponse = await fetch(apiUrl + '?_=' + Date.now(), {
                method: 'GET',
                headers: {
                    'Accept': 'application/json, text/plain, */*',
                },
                cache: 'no-cache',
                signal: AbortSignal.timeout(10000)
            });
            
            if (!fetchResponse.ok) {
                throw new Error('API请求失败，状态码：' + fetchResponse.status);
            }
            
            const responseText = await fetchResponse.text();
            
            // 尝试解析时间戳
            let timestamp = '';
            try {
                const data = JSON.parse(responseText);
                timestamp = data.time || data.t || data.timestamp || (data.data && data.data.time) || '';
            } catch (e) {
                timestamp = responseText.trim();
            }
            
            if (!timestamp || timestamp.length < 6) {
                throw new Error('获取时间戳失败，API返回：' + responseText);
            }
            
            showStatus('✅ 时间戳获取成功，正在跳转...', 'success');
            
            // 构造签到URL
            const checkinUrl = `http://www.skalibrary.net/wx/scancheck?school=sdufe&type=${type}&t=${timestamp}`;
            
            // 延迟1秒后跳转
            setTimeout(() => {
                window.location.href = checkinUrl;
            }, 1000);
            
        } catch (error) {
            console.error('操作失败：', error);
            showStatus('❌ ' + error.message + '<br><br>📱 <strong>请确保已连接校园网（SDUFE）后重试</strong><br><br>💡 建议：<br>   • 使用手机默认浏览器（Chrome/Safari）<br>   • 关闭移动数据，强制走WLAN', 'error');
            setButtonsDisabled(false);
        }
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
        // 密码验证模块会自动调用 initApp()
        // 如果已经通过验证，则直接显示主界面
        const savedAuth = localStorage.getItem('library_auth');
        if (savedAuth === 'true') {
            initApp();
        }
    });
    </script>
</body>
</html>
